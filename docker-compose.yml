services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radar}
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes: [radar-data:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"], interval: 10s, timeout: 5s, retries: 10}
  api:
    build: {context: ., target: api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-radar}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      PUBLIC_URL: ${PUBLIC_URL:?set PUBLIC_URL}
    depends_on: {db: {condition: service_healthy}}
    healthcheck: {test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"], interval: 15s, timeout: 5s, retries: 10}
  web:
    build: {context: ., target: web}
    restart: unless-stopped
    ports: ["80:80"]
    depends_on: {api: {condition: service_healthy}}
volumes: {radar-data: {}}
